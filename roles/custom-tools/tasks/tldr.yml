---
- name: Check if tealdeer is installed
  ansible.builtin.stat:
    path: "{{ cargo_bin }}/tldr"
  register: tealdeer_stat

- name: Install tealdeer via cargo
  when: not tealdeer_stat.stat.exists
  ansible.builtin.shell: |
    source {{ user_home }}/.cargo/env
    cargo install tealdeer
  args:
    executable: /bin/bash
    creates: "{{ cargo_bin }}/tldr"

- name: Update tldr cache
  ansible.builtin.shell: |
    source {{ user_home }}/.cargo/env
    tldr --update
  args:
    executable: /bin/bash
  changed_when: false
