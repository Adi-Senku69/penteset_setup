---
- name: Check if uv is installed
  ansible.builtin.command: which uv
  register: uv_check
  changed_when: false
  failed_when: false

- name: Install uv via official installer
  when: uv_check.rc != 0
  ansible.builtin.shell: |
    curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    executable: /bin/bash
    creates: "{{ local_bin }}/uv"
