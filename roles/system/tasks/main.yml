---
- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install prerequisite packages
  become: true
  ansible.builtin.apt:
    name:
      - git
      - nodejs
      - npm
      - xclip
      - ripgrep
      - fd-find
      - fzf
      - jq
      - p7zip-full
      - zoxide
      - curl
      - wget
      - unzip
      - fontconfig
      - zsh
      - cmake
      - pkg-config
      - libfreetype6-dev
      - libfontconfig1-dev
      - libxcb-xfixes0-dev
      - libxkbcommon-dev
      - python3
      - luarocks
      - libc6-dev
      - openvpn
      - flameshot
      - exploitdb
    state: present

- name: Check display server type
  ansible.builtin.set_fact:
    is_wayland: "{{ ansible_env.WAYLAND_DISPLAY is defined or ansible_env.XDG_SESSION_TYPE == 'wayland' }}"

- name: Install freerdp for Wayland
  become: true
  when: is_wayland
  ansible.builtin.apt:
    name: freerdp3-wayland
    state: present

- name: Install freerdp for X11
  become: true
  when: not is_wayland
  ansible.builtin.apt:
    name: freerdp3-x11
    state: present

- name: Autoremove unused packages
  become: true
  ansible.builtin.apt:
    autoremove: true

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ local_bin }}"
    state: directory
    mode: "0755"
